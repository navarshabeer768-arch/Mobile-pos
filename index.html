<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1f2e">
  <meta name="description" content="MobilePOS - Distribution & Retail Management System">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MobilePOS">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/main.css">
  <title>MobilePOS — Distribution & Retail Manager</title>
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="login-container">
        <div class="login-logo">
          <div class="logo-icon">📱</div>
          <h1>MobilePOS</h1>
          <p>Distribution & Retail Manager</p>
        </div>
        <div class="login-form card">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="login-user" placeholder="Enter username" autocomplete="username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password">
          </div>
          <div id="login-error" class="error-msg" style="display:none"></div>
          <button class="btn btn-primary btn-full" onclick="App.login()">Sign In</button>
          <p class="hint-text">Default: admin / admin123</p>
        </div>
        <div class="offline-badge" id="offline-badge" style="display:none">⚡ Offline Mode</div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" style="display:none">
      <!-- Top Bar -->
      <header class="topbar">
        <button class="menu-btn" onclick="UI.toggleSidebar()">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-right">
          <span class="sync-status" id="sync-status" title="Sync status">🟢</span>
          <span class="user-badge" id="user-badge"></span>
          <button class="btn-icon" onclick="App.logout()" title="Logout">⏏</button>
        </div>
      </header>

      <!-- Sidebar -->
      <nav id="sidebar" class="sidebar">
        <div class="sidebar-logo">
          <span>📱</span> MobilePOS
          <button class="sidebar-close" onclick="UI.toggleSidebar()">✕</button>
        </div>
        <div class="nav-items">
          <a class="nav-item active" onclick="UI.navigate('dashboard')" data-page="dashboard">
            <span class="nav-icon">📊</span> Dashboard
          </a>
          <a class="nav-item" onclick="UI.navigate('pos')" data-page="pos">
            <span class="nav-icon">🛒</span> Point of Sale
          </a>
          <a class="nav-item" onclick="UI.navigate('invoices')" data-page="invoices">
            <span class="nav-icon">🧾</span> Invoices
          </a>
          <a class="nav-item" onclick="UI.navigate('customers')" data-page="customers">
            <span class="nav-icon">👥</span> Customers
          </a>
          <a class="nav-item" onclick="UI.navigate('inventory')" data-page="inventory">
            <span class="nav-icon">📦</span> Inventory
          </a>
          <a class="nav-item" onclick="UI.navigate('purchases')" data-page="purchases">
            <span class="nav-icon">🚚</span> Purchases
          </a>
          <a class="nav-item" onclick="UI.navigate('expenses')" data-page="expenses">
            <span class="nav-icon">💸</span> Expenses
          </a>
          <a class="nav-item" onclick="UI.navigate('reports')" data-page="reports">
            <span class="nav-icon">📈</span> Reports
          </a>
          <div class="nav-divider"></div>
          <a class="nav-item" onclick="UI.navigate('settings')" data-page="settings">
            <span class="nav-icon">⚙️</span> Settings
          </a>
        </div>
        <div class="sidebar-footer">
          <small id="sidebar-version">v1.0.0</small>
        </div>
      </nav>
      <div class="sidebar-overlay" id="sidebar-overlay" onclick="UI.toggleSidebar()"></div>

      <!-- Page Content -->
      <main id="page-content" class="page-content">
        <!-- Pages injected by JS -->
      </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
      <div id="modal-box" class="modal-box"></div>
    </div>

    <!-- Print Frame -->
    <iframe id="print-frame" style="display:none"></iframe>
  </div>

  <script src="js/db.js"></script>
  <script src="js/wac.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/pos.js"></script>
  <script src="js/pages/invoices.js"></script>
  <script src="js/pages/customers.js"></script>
  <script src="js/pages/inventory.js"></script>
  <script src="js/pages/purchases.js"></script>
  <script src="js/pages/expenses.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/invoice-print.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
