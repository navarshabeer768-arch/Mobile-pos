   MobilePOS - Expenses Page
   ============================================ */

const ExpensesPage = {
  CATEGORIES: ['Rent', 'Salaries', 'Transport', 'Utilities', 'Marketing', 'Maintenance', 'Miscellaneous'],

  async render() {
    const expenses = await DB.getAll('expenses');
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    const sorted = [...expenses].sort((a, b) => b.created_at - a.created_at);

    const today = new Date().toISOString().slice(0, 10);
    const thisMonth = today.slice(0, 7);
    const todayTotal = expenses.filter(e => e.date === today).reduce((s, e) => s + (e.amount || 0), 0);
    const monthTotal = expenses.filter(e => e.date.startsWith(thisMonth)).reduce((s, e) => s + (e.amount || 0), 0);

    // Monthly breakdown by category
    const monthExp = expenses.filter(e => e.date.startsWith(thisMonth));
    const catBreakdown = {};
    this.CATEGORIES.forEach(c => { catBreakdown[c] = 0; });
    monthExp.forEach(e => { catBreakdown[e.category] = (catBreakdown[e.category] || 0) + (e.amount || 0); });

    return `
      <div class="page-header">
        <h2>💸 Expenses</h2>
        <button class="btn btn-primary" onclick="ExpensesPage.openForm()">+ Add Expense</button>
      </div>

      <div class="grid-2" style="margin-bottom:16px">
        <div class="stat-card warning">
          <div class="stat-label">Today's Expenses</div>
          <div class="stat-value">${currency} ${fmt(todayTotal)}</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-label">This Month</div>
          <div class="stat-value">${currency} ${fmt(monthTotal)}</div>
        </div>
      </div>

      <div class="grid-2" style="margin-bottom:16px">
        <div class="card">
          <div class="card-title">Month Breakdown by Category</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${Object.entries(catBreakdown).filter(([,v]) => v > 0).sort(([,a],[,b]) => b-a).map(([cat, amt]) => `
              <div style="display:flex;align-items:center;gap:8px">
                <span style="flex:1;font-size:12px">${cat}</span>
                <div style="flex:2;background:var(--bg-card2);border-radius:4px;height:8px;overflow:hidden">
                  <div style="height:100%;background:var(--warning);border-radius:4px;width:${monthTotal > 0 ? (amt/monthTotal*100) : 0}%;transition:width .3s"></div>
                </div>
                <span style="font-size:12px;font-weight:600;min-width:80px;text-align:right">${currency} ${fmt(amt)}</span>
              </div>
            `).join('') || '<p style="color:var(--text-muted);font-size:12px">No expenses this month</p>'}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Quick Filter</div>
          <div class="search-bar" style="margin:0">
            <input type="month" id="exp-month-filter" value="${thisMonth}" onchange="ExpensesPage.filter()" style="flex:1">
            <select id="exp-cat-filter" onchange="ExpensesPage.filter()" style="width:150px">
              <option value="">All Categories</option>
              ${this.CATEGORIES.map(c => `<option>${c}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Added By</th><th>Actions</th>
            </tr></thead>
            <tbody id="expenses-tbody">
              ${sorted.length === 0 ? `<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">No expenses recorded</td></tr>` :
              sorted.map(e => `
                <tr data-date="${e.date}" data-cat="${e.category}">
                  <td class="text-sm">${e.date}</td>
                  <td><span class="badge badge-warning">${e.category}</span></td>
                  <td>${e.description || '—'}</td>
                  <td class="fw-bold text-danger">${currency} ${fmt(e.amount)}</td>
                  <td class="text-sm text-muted">${e.created_by || '—'}</td>
                  <td>
                    <div class="table-actions">
                      <button class="btn btn-ghost btn-sm" onclick="ExpensesPage.openForm(${e.id})">✏️</button>
                      ${App.currentUser?.role === 'admin' ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="ExpensesPage.delete(${e.id})">🗑</button>` : ''}
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  },

  filter() {
    const month = document.getElementById('exp-month-filter')?.value || '';
    const cat = document.getElementById('exp-cat-filter')?.value || '';
    document.querySelectorAll('#expenses-tbody tr').forEach(r => {
      const matchMonth = !month || (r.dataset.date || '').startsWith(month);
      const matchCat = !cat || r.dataset.cat === cat;
      r.style.display = (matchMonth && matchCat) ? '' : 'none';
    });
  },

  async openForm(id = null) {
    const e = id ? await DB.get('expenses', id) : {};
    UI.modal(`
      <div class="modal-title">${id ? 'Edit Expense' : 'Add Expense'}</div>
      <div class="form-row">
        <div class="form-group"><label>Date</label>
          <input id="ef-date" type="date" value="${e.date || new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label>Category</label>
          <select id="ef-cat">
            ${this.CATEGORIES.map(c => `<option ${c === (e.category || '') ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label>Description</label>
        <input id="ef-desc" value="${e.description || ''}" placeholder="Office rent for June..."></div>
      <div class="form-group"><label>Amount *</label>
        <input id="ef-amount" type="number" value="${e.amount || ''}" step="0.01" min="0" placeholder="0.00"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="ExpensesPage.save(${id || 'null'})">Save</button>
      </div>
    `);
  },

  async save(id) {
    const amount = parseFloat(document.getElementById('ef-amount')?.value);
    if (!amount || amount <= 0) { UI.toast('Enter valid amount', 'error'); return; }
    const data = {
      date: document.getElementById('ef-date').value,
      category: document.getElementById('ef-cat').value,
      description: document.getElementById('ef-desc').value,
      amount,
      created_by: App.currentUser?.username || 'staff',
    };
    if (id) {
      const existing = await DB.get('expenses', id);
      await DB.put('expenses', { ...existing, ...data });
    } else {
      await DB.add('expenses', { ...data, created_at: Date.now() });
    }
    UI.toast('Expense saved', 'success');
    UI.closeModal();
    UI.navigate('expenses');
  },

  async delete(id) {
    if (!confirm('Delete this expense?')) return;
    await DB.remove('expenses', id);
    UI.toast('Expense deleted', 'warning');
    UI.navigate('expenses');
  },
};


/* ============================================
   MobilePOS - Reports Page
   ============================================ */

const ReportsPage = {
  async render() {
    return `
      <div class="page-header">
        <h2>📈 Reports & Analytics</h2>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="ReportsPage.switchTab('pl',this)">P&L</button>
        <button class="tab-btn" onclick="ReportsPage.switchTab('sales',this)">Sales</button>
        <button class="tab-btn" onclick="ReportsPage.switchTab('outstanding',this)">Outstanding</button>
        <button class="tab-btn" onclick="ReportsPage.switchTab('products',this)">Products</button>
        <button class="tab-btn" onclick="ReportsPage.switchTab('stock',this)">Stock</button>
        <button class="tab-btn" onclick="ReportsPage.switchTab('audit',this)">Audit Log</button>
      </div>
      <div id="report-content">
        <div class="loading">Loading...</div>
      </div>
    `;
  },

  async init() {
    await this.loadPL();
  },

  switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const fn = { pl: 'loadPL', sales: 'loadSales', outstanding: 'loadOutstanding', products: 'loadProducts', stock: 'loadStock', audit: 'loadAudit' };
    if (fn[tab]) this[fn[tab]]();
  },

  setContent(html) {
    const el = document.getElementById('report-content');
    if (el) el.innerHTML = html;
  },

  async loadPL() {
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    const today = new Date().toISOString().slice(0, 10);
    const thisMonth = today.slice(0, 7);

    const invoices = await DB.getAll('invoices');
    const expenses = await DB.getAll('expenses');

    // Build monthly data for last 6 months
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      const m = d.toISOString().slice(0, 7);
      const label = d.toLocaleDateString('en', { month: 'short', year: '2-digit' });
      const revenue = invoices.filter(inv => inv.date.startsWith(m) && inv.status !== 'void').reduce((s, inv) => s + (inv.total || 0), 0);
      const profit = invoices.filter(inv => inv.date.startsWith(m) && inv.status !== 'void').reduce((s, inv) => s + (inv.profit || 0), 0);
      const expAmt = expenses.filter(e => e.date.startsWith(m)).reduce((s, e) => s + (e.amount || 0), 0);
      months.push({ label, m, revenue, profit, expAmt, net: profit - expAmt });
    }

    const maxRev = Math.max(...months.map(m => m.revenue), 1);
    const thisM = months[months.length - 1];

    this.setContent(`
      <div class="grid-2" style="margin-bottom:16px">
        <div style="display:flex;gap:8px;margin-bottom:0">
          <div class="stat-card accent flex-1"><div class="stat-label">This Month Revenue</div><div class="stat-value" style="font-size:20px">${currency} ${fmt(thisM.revenue)}</div></div>
          <div class="stat-card success flex-1"><div class="stat-label">Gross Profit</div><div class="stat-value" style="font-size:20px">${currency} ${fmt(thisM.profit)}</div></div>
        </div>
        <div style="display:flex;gap:8px">
          <div class="stat-card warning flex-1"><div class="stat-label">Expenses</div><div class="stat-value" style="font-size:20px">${currency} ${fmt(thisM.expAmt)}</div></div>
          <div class="stat-card ${thisM.net >= 0 ? 'success' : 'danger'} flex-1"><div class="stat-label">Net Profit</div><div class="stat-value" style="font-size:20px">${currency} ${fmt(thisM.net)}</div></div>
        </div>
      </div>

      <div class="chart-wrap">
        <div class="card-title">Revenue vs Expenses — Last 6 Months</div>
        <div style="display:flex;gap:12px;align-items:flex-end;height:160px;padding-top:10px">
          ${months.map(m => `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;width:100%;gap:2px">
                <div title="Revenue: ${currency} ${fmt(m.revenue)}" style="height:${Math.max(4, m.revenue/maxRev*110)}px;background:var(--accent-dim);border-radius:4px 4px 0 0;transition:height .4s;cursor:pointer" onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background='var(--accent-dim)'"></div>
                <div title="Net: ${currency} ${fmt(m.net)}" style="height:${Math.max(4, Math.abs(m.net)/maxRev*110)}px;background:${m.net >= 0 ? 'var(--success-dim)' : 'var(--danger-dim)'};border-radius:4px 4px 0 0;transition:height .4s"></div>
              </div>
              <div style="font-size:10px;color:var(--text-muted)">${m.label}</div>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px">
          <span style="color:var(--accent)">■ Revenue</span>
          <span style="color:var(--success)">■ Net Profit</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Monthly P&L Summary</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Month</th><th>Revenue</th><th>COGS</th><th>Gross Profit</th><th>Expenses</th><th>Net Profit</th><th>Margin</th></tr></thead>
            <tbody>
              ${months.map(m => {
                const cogs = m.revenue - m.profit;
                const margin = m.revenue > 0 ? (m.net / m.revenue * 100) : 0;
                return `
                  <tr>
                    <td class="fw-bold">${m.label}</td>
                    <td>${currency} ${fmt(m.revenue)}</td>
                    <td class="text-muted">${currency} ${fmt(cogs)}</td>
                    <td class="text-success">${currency} ${fmt(m.profit)}</td>
                    <td class="text-warning">${currency} ${fmt(m.expAmt)}</td>
                    <td class="${m.net >= 0 ? 'text-success' : 'text-danger'} fw-bold">${currency} ${fmt(m.net)}</td>
                    <td><span class="badge ${margin >= 15 ? 'badge-success' : margin >= 5 ? 'badge-warning' : 'badge-danger'}">${fmt(margin)}%</span></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `);
  },

  async loadSales() {
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    const invoices = await DB.getAll('invoices');
    const today = new Date().toISOString().slice(0, 10);

    // Last 30 days
    const last30 = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0, 10);
      const daySales = invoices.filter(inv => inv.date === ds && inv.status !== 'void').reduce((s, inv) => s + (inv.total || 0), 0);
      last30.push({ date: ds, val: daySales, label: d.getDate() });
    }
    const maxDay = Math.max(...last30.map(d => d.val), 1);

    this.setContent(`
      <div class="chart-wrap" style="margin-bottom:16px">
        <div class="card-title">Daily Sales — Last 30 Days</div>
        <div style="display:flex;gap:3px;align-items:flex-end;height:100px;overflow-x:auto">
          ${last30.map(d => `
            <div style="flex-shrink:0;width:20px;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">
                <div title="${d.date}: ${currency} ${fmt(d.val)}" style="width:100%;height:${Math.max(d.val > 0 ? 4 : 0, d.val/maxDay*80)}px;background:${d.date === today ? 'var(--accent)' : 'var(--accent-dim)'};border-radius:2px 2px 0 0"></div>
              </div>
              <div style="font-size:8px;color:var(--text-muted)">${d.label}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="card-title" style="margin:0">Invoice List</div>
          <div style="display:flex;gap:8px">
            <input type="date" id="rpt-date-from" style="width:140px;font-size:12px" placeholder="From">
            <input type="date" id="rpt-date-to" value="${today}" style="width:140px;font-size:12px" placeholder="To">
            <button class="btn btn-ghost btn-sm" onclick="ReportsPage.filterSalesTable()">Filter</button>
          </div>
        </div>
        <div class="table-wrap" style="max-height:400px;overflow-y:auto">
          <table>
            <thead><tr><th>Invoice #</th><th>Customer</th><th>Date</th><th>Revenue</th><th>Profit</th><th>Mode</th></tr></thead>
            <tbody id="sales-tbody">
              ${[...invoices].filter(i => i.status !== 'void').sort((a,b) => b.created_at - a.created_at).slice(0,50).map(inv => `
                <tr data-date="${inv.date}">
                  <td class="text-accent">${inv.invoice_no}</td>
                  <td>${inv.customer_name || 'Walk-in'}</td>
                  <td class="text-sm text-muted">${inv.date}</td>
                  <td class="fw-bold">${currency} ${fmt(inv.total)}</td>
                  <td class="text-success">${currency} ${fmt(inv.profit)}</td>
                  <td><span class="badge ${inv.payment_mode === 'cash' ? 'badge-success' : 'badge-warning'}">${inv.payment_mode}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `);
  },

  filterSalesTable() {
    const from = document.getElementById('rpt-date-from')?.value || '';
    const to = document.getElementById('rpt-date-to')?.value || '';
    document.querySelectorAll('#sales-tbody tr').forEach(r => {
      const date = r.dataset.date || '';
      const ok = (!from || date >= from) && (!to || date <= to);
      r.style.display = ok ? '' : 'none';
    });
  },

  async loadOutstanding() {
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    const customers = await DB.getAll('customers');
    const outstanding = customers.filter(c => (c.outstanding || 0) > 0).sort((a, b) => (b.outstanding || 0) - (a.outstanding || 0));
    const totalOut = outstanding.reduce((s, c) => s + (c.outstanding || 0), 0);

    this.setContent(`
      <div class="stat-card warning" style="margin-bottom:16px;max-width:300px">
        <div class="stat-label">Total Outstanding</div>
        <div class="stat-value">${currency} ${fmt(totalOut)}</div>
        <div class="stat-sub">${outstanding.length} customer(s)</div>
      </div>
      <div class="card">
        <div class="card-title">Customer Outstanding Balances</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Customer</th><th>Phone</th><th>Outstanding</th><th>Credit Limit</th><th>Usage</th><th>Actions</th></tr></thead>
            <tbody>
              ${outstanding.length === 0 ? `<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:20px">All clear! No outstanding balances.</td></tr>` :
                outstanding.map(c => {
                  const usage = c.credit_limit > 0 ? (c.outstanding / c.credit_limit * 100) : 0;
                  return `
                    <tr>
                      <td class="fw-bold">${c.name}</td>
                      <td class="text-sm text-muted">${c.phone || '—'}</td>
                      <td class="fw-bold text-warning">${currency} ${fmt(c.outstanding)}</td>
                      <td class="text-muted text-sm">${currency} ${fmt(c.credit_limit)}</td>
                      <td>
                        <div style="display:flex;align-items:center;gap:6px">
                          <div style="flex:1;background:var(--bg-card2);border-radius:4px;height:6px;min-width:60px">
                            <div style="height:100%;background:${usage > 90 ? 'var(--danger)' : usage > 70 ? 'var(--warning)' : 'var(--success)'};border-radius:4px;width:${Math.min(100,usage)}%"></div>
                          </div>
                          <span style="font-size:11px">${fmt(usage)}%</span>
                        </div>
                      </td>
                      <td>
                        <button class="btn btn-success btn-sm" onclick="ReportsPage.recordPayment(${c.id})">+ Payment</button>
                      </td>
                    </tr>
                  `;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `);
  },

  async recordPayment(customerId) {
    const cust = await DB.get('customers', customerId);
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    UI.modal(`
      <div class="modal-title">Record Payment — ${cust.name}</div>
      <div style="margin-bottom:12px;font-size:13px">Outstanding: <strong class="text-warning">${currency} ${fmt(cust.outstanding)}</strong></div>
      <div class="form-group"><label>Payment Amount (${currency})</label>
        <input id="pay-amount" type="number" value="${cust.outstanding}" step="0.01" min="0"></div>
      <div class="form-row">
        <div class="form-group"><label>Date</label>
          <input id="pay-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label>Method</label>
          <select id="pay-method">
            <option>Cash</option><option>Bank Transfer</option><option>Cheque</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Notes</label>
        <input id="pay-notes" placeholder="Reference number..."></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-success" onclick="ReportsPage.savePayment(${customerId})">Save Payment</button>
      </div>
    `);
  },

  async savePayment(customerId) {
    const amount = parseFloat(document.getElementById('pay-amount')?.value) || 0;
    if (amount <= 0) { UI.toast('Enter valid amount', 'error'); return; }
    const cust = await DB.get('customers', customerId);
    await DB.put('customers', { ...cust, outstanding: Math.max(0, (cust.outstanding || 0) - amount) });
    await DB.add('payments', {
      customer_id: customerId, amount,
      date: document.getElementById('pay-date').value,
      method: document.getElementById('pay-method').value,
      notes: document.getElementById('pay-notes').value,
      timestamp: Date.now(),
    });
    await DB.audit('payment', 'customer', customerId, `${amount}`);
    UI.toast('Payment recorded', 'success');
    UI.closeModal();
    this.loadOutstanding();
    document.getElementById('report-content') && this.loadOutstanding();
  },

  async loadProducts() {
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    const invoiceItems = await DB.getAll('invoice_items');
    const products = await DB.getAll('products');
    const invoices = await DB.getAll('invoices');
    const validInvIds = new Set(invoices.filter(i => i.status !== 'void').map(i => i.id));

    const productStats = {};
    invoiceItems.filter(it => validInvIds.has(it.invoice_id)).forEach(it => {
      if (!productStats[it.product_id]) {
        productStats[it.product_id] = { name: it.product_name, qty: 0, revenue: 0, profit: 0 };
      }
      productStats[it.product_id].qty += it.qty;
      productStats[it.product_id].revenue += it.line_total || 0;
      productStats[it.product_id].profit += it.profit || 0;
    });

    const sorted = Object.entries(productStats).sort(([,a],[,b]) => b.qty - a.qty);

    this.setContent(`
      <div class="card">
        <div class="card-title">Top Selling Products</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Product</th><th>Qty Sold</th><th>Revenue</th><th>Profit</th><th>Margin</th></tr></thead>
            <tbody>
              ${sorted.length === 0 ? `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px">No sales data</td></tr>` :
                sorted.map(([id, s]) => {
                  const margin = s.revenue > 0 ? (s.profit / s.revenue * 100) : 0;
                  return `
                    <tr>
                      <td class="fw-medium">${s.name}</td>
                      <td class="fw-bold text-accent">${s.qty}</td>
                      <td>${currency} ${fmt(s.revenue)}</td>
                      <td class="text-success">${currency} ${fmt(s.profit)}</td>
                      <td><span class="badge ${margin >= 20 ? 'badge-success' : margin >= 10 ? 'badge-warning' : 'badge-danger'}">${fmt(margin)}%</span></td>
                    </tr>
                  `;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `);
  },

  async loadStock() {
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    const products = await DB.getAll('products');
    const categories = await DB.getAll('categories');
    const catMap = {};
    categories.forEach(c => { catMap[c.id] = c.name; });
    const active = products.filter(p => p.active !== false).sort((a, b) => a.stock_qty - b.stock_qty);

    const totalCostValue = active.reduce((s, p) => s + p.avg_cost * p.stock_qty, 0);
    const totalRetailValue = active.reduce((s, p) => s + p.selling_price * p.stock_qty, 0);
    const potentialProfit = totalRetailValue - totalCostValue;

    this.setContent(`
      <div class="stats-grid" style="margin-bottom:16px">
        <div class="stat-card warning"><div class="stat-label">Stock Cost Value</div><div class="stat-value" style="font-size:20px">${currency} ${fmt(totalCostValue)}</div></div>
        <div class="stat-card accent"><div class="stat-label">Retail Value</div><div class="stat-value" style="font-size:20px">${currency} ${fmt(totalRetailValue)}</div></div>
        <div class="stat-card success"><div class="stat-label">Potential Profit</div><div class="stat-value" style="font-size:20px">${currency} ${fmt(potentialProfit)}</div></div>
      </div>
      <div class="card">
        <div class="card-title">Full Stock Report (with WAC)</div>
        <div class="table-wrap" style="max-height:500px;overflow-y:auto">
          <table>
            <thead><tr><th>Product</th><th>Category</th><th>Stock</th><th>Avg Cost (WAC)</th><th>Sell Price</th><th>Margin</th><th>Stock Value</th><th>Alert</th></tr></thead>
            <tbody>
              ${active.map(p => {
                const margin = p.avg_cost > 0 ? ((p.selling_price - p.avg_cost) / p.avg_cost * 100) : 0;
                const isLow = p.stock_qty <= (p.min_stock || 5);
                const isOut = p.stock_qty <= 0;
                return `
                  <tr>
                    <td class="fw-medium">${p.name}</td>
                    <td><span class="badge badge-gray">${catMap[p.category_id] || '—'}</span></td>
                    <td class="fw-bold ${isOut ? 'text-danger' : isLow ? 'text-warning' : 'text-success'}">${p.stock_qty}</td>
                    <td class="text-warning">${currency} ${fmt(p.avg_cost)}</td>
                    <td class="text-accent">${currency} ${fmt(p.selling_price)}</td>
                    <td><span class="badge ${margin >= 20 ? 'badge-success' : margin >= 10 ? 'badge-warning' : 'badge-danger'}">${fmt(margin)}%</span></td>
                    <td>${currency} ${fmt(p.avg_cost * p.stock_qty)}</td>
                    <td>${isOut ? '<span class="badge badge-danger">Out</span>' : isLow ? '<span class="badge badge-warning">Low</span>' : '<span class="badge badge-success">OK</span>'}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `);
  },

  async loadAudit() {
    const logs = await DB.getAll('audit_log');
    const sorted = [...logs].sort((a, b) => b.timestamp - a.timestamp).slice(0, 100);

    this.setContent(`
      <div class="card">
        <div class="card-title">Audit Log (Last 100 entries)</div>
        <div class="table-wrap" style="max-height:600px;overflow-y:auto">
          <table>
            <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Entity</th><th>ID</th><th>Details</th></tr></thead>
            <tbody>
              ${sorted.length === 0 ? '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:20px">No audit records</td></tr>' :
                sorted.map(l => `
                  <tr>
                    <td class="text-sm text-muted">${new Date(l.timestamp).toLocaleString('en')}</td>
                    <td><span class="badge badge-info">${l.user}</span></td>
                    <td><span class="badge ${l.action === 'create' ? 'badge-success' : l.action === 'void' ? 'badge-danger' : 'badge-gray'}">${l.action}</span></td>
                    <td class="text-sm">${l.entity}</td>
                    <td class="text-muted text-sm">${l.entity_id}</td>
                    <td class="text-sm text-muted">${l.details || '—'}</td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `);
  },
};

  async renderData() {
    return `
      <div class="grid-2">
        <div class="card">
          <div class="card-title">💾 Backup & Restore</div>
          <p style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">Export all data as JSON backup file.</p>
          <button class="btn btn-primary btn-full" onclick="SettingsPage.exportData()" style="margin-bottom:8px">⬇️ Export Backup (JSON)</button>
          <div class="form-group"><label>Restore from Backup</label>
            <input type="file" id="restore-file" accept=".json" style="padding:8px"></div>
          <button class="btn btn-warning btn-full" onclick="SettingsPage.restoreData()">⬆️ Restore from Backup</button>
        </div>
        <div class="card">
          <div class="card-title">🗑️ Danger Zone</div>
          <p style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">Irreversible actions.</p>
          <button class="btn btn-danger btn-full" style="margin-bottom:8px" onclick="SettingsPage.clearInvoices()">Clear All Invoices</button>
          <button class="btn btn-danger btn-full" onclick="SettingsPage.factoryReset()">Factory Reset (Clear ALL Data)</button>
        </div>
      </div>
    `;
  },

  async exportData() {
    const stores = ['users','customers','stores','products','categories','suppliers','invoices','invoice_items','purchases','purchase_items','expenses','payments','stock_ledger','settings','audit_log'];
    const backup = { version: 1, timestamp: Date.now(), data: {} };
    for (const s of stores) {
      backup.data[s] = await DB.getAll(s);
    }
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mobilepos-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    UI.toast('Backup exported!', 'success');
  },

  async restoreData() {
    const file = document.getElementById('restore-file')?.files[0];
    if (!file) { UI.toast('Select a backup file', 'error'); return; }
    if (!confirm('This will REPLACE all current data. Continue?')) return;
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      if (!backup.data) throw new Error('Invalid backup');
      for (const [storeName, records] of Object.entries(backup.data)) {
        await DB.clear(storeName);
        for (const r of records) await DB.put(storeName, r);
      }
      App._settings = null;
      UI.toast('Data restored! Reloading...', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch (e) {
      UI.toast('Restore failed: ' + e.message, 'error');
    }
  },

  async clearInvoices() {
    if (!confirm('Delete ALL invoices? Stock will NOT be restored.')) return;
    await DB.clear('invoices');
    await DB.clear('invoice_items');
    await DB.clear('payments');
    UI.toast('Invoices cleared', 'warning');

  async factoryReset() {
    if (!prompt('Type RESET to confirm factory reset:')?.trim().toUpperCase() === 'RESET') return;
    const dbs = ['users','customers','stores','products','categories','suppliers','invoices','invoice_items','purchases','purchase_items','expenses','payments','stock_ledger','settings','audit_log'];
    for (const s of dbs) await DB.clear(s);
    UI.toast('Reset complete. Reloading...', 'warning');
    setTimeout(() => location.reload(), 1000);

/* ============================================
   MobilePOS - App Orchestration & UI Controller
   ============================================ */

/* ---- App State ---- */
const App = {
  currentUser: null,
  _settings: null,

  async init() {
    // Open DB
    await DB.open();

    // Seed default data if first run
    await seedDefaultData();

    // Check persisted session
    const savedUser = localStorage.getItem('pos_user');
    if (savedUser) {
      try {
        this.currentUser = JSON.parse(savedUser);
        this.showMainApp();
      } catch {
        localStorage.removeItem('pos_user');
        this.showLogin();
      }
    } else {
      this.showLogin();
    }

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('SW registered:', reg.scope);
      }).catch(err => {
        console.warn('SW registration failed:', err);
      });
    }

    // Offline/online detection
    window.addEventListener('online', () => {
      document.getElementById('sync-status').textContent = '🟢';
      document.getElementById('offline-badge') && (document.getElementById('offline-badge').style.display = 'none');
    });
    window.addEventListener('offline', () => {
      document.getElementById('sync-status').textContent = '🟠';
    });
    if (!navigator.onLine) {
      document.getElementById('sync-status').textContent = '🟠';
    }

    // Enter key on login
    document.getElementById('login-pass')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') this.login();
    });
    document.getElementById('login-user')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-pass')?.focus();
    });
  },

  async login() {
    const username = document.getElementById('login-user')?.value.trim();
    const password = document.getElementById('login-pass')?.value;
    const errEl = document.getElementById('login-error');

    if (!username || !password) {
      errEl.textContent = 'Please enter username and password';
      errEl.style.display = 'block';
      return;
    }

    const users = await DB.getAll('users');
    const user = users.find(u => u.username === username && u.password === password);

    if (!user) {
      errEl.textContent = 'Invalid username or password';
      errEl.style.display = 'block';
      document.getElementById('login-pass').value = '';
      return;
    }

    this.currentUser = user;
    localStorage.setItem('pos_user', JSON.stringify({ id: user.id, username: user.username, name: user.name, role: user.role }));
    this._settings = null;
    errEl.style.display = 'none';
    this.showMainApp();
    await DB.audit('login', 'user', user.id, user.username);
  },

  logout() {
    if (!confirm('Sign out?')) return;
    this.currentUser = null;
    localStorage.removeItem('pos_user');
    this._settings = null;
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-error').style.display = 'none';
    UI.closeSidebar();
  },

  showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
    setTimeout(() => document.getElementById('login-user')?.focus(), 100);
  },

  showMainApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('user-badge').textContent = `${this.currentUser.role === 'admin' ? '👑 ' : ''}${this.currentUser.name}`;
    this.getSettings().then(s => {
      document.getElementById('sidebar-version').textContent = `v1.0.0 — ${s.company_name || 'MobilePOS'}`;
    });
    UI.navigate('dashboard');
  },

  async getSettings() {
    if (this._settings) return this._settings;
    const keys = ['company_name','company_address','company_phone','company_email','currency','tax_enabled','tax_rate','invoice_prefix','invoice_counter','low_stock_threshold'];
    const settings = {};
    for (const k of keys) {
      settings[k] = await DB.getSetting(k);
    }
    this._settings = settings;
    return settings;
  },
};

/* ---- UI Controller ---- */
const UI = {
  _currentPage: null,
  _currentPageInstance: null,

  async navigate(page) {
    // Clean up current page
    if (this._currentPageInstance?.cleanup) {
      this._currentPageInstance.cleanup();
    }

    // Update active nav
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });

    // Page title map
    const titles = {
      dashboard: '📊 Dashboard',
      pos: '🛒 Point of Sale',
      invoices: '🧾 Invoices',
      customers: '👥 Customers',
      inventory: '📦 Inventory',
      purchases: '🚚 Purchases',
      expenses: '💸 Expenses',
      reports: '📈 Reports',
      settings: '⚙️ Settings',
    };
    document.getElementById('page-title').textContent = titles[page] || page;

    // Close sidebar on mobile
    this.closeSidebar();

    // Render the page
    const container = document.getElementById('page-content');
    container.innerHTML = '<div class="loading">⏳</div>';

    const pageMap = {
      dashboard: DashboardPage,
      pos: POSPage,
      invoices: InvoicesPage,
      customers: CustomersPage,
      inventory: InventoryPage,
      purchases: PurchasesPage,
      expenses: ExpensesPage,
      reports: ReportsPage,
      settings: SettingsPage,
    };

    const pageObj = pageMap[page];
    if (!pageObj) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">🚧</div><h3>Page not found</h3></div>'; return; }

    this._currentPageInstance = pageObj;
    this._currentPage = page;

    try {
      const html = await pageObj.render();
      container.innerHTML = html;
      if (pageObj.init) await pageObj.init();
    } catch (err) {
      console.error('Page render error:', err);
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><h3>Page Error</h3><p>${err.message}</p></div>`;
    }
  },

  toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const isOpen = sidebar.classList.contains('open');
    if (isOpen) {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    } else {
      sidebar.classList.add('open');
      overlay.classList.add('active');
    }
  },

  closeSidebar() {
    document.getElementById('sidebar')?.classList.remove('open');
    document.getElementById('sidebar-overlay')?.classList.remove('active');
  },

  modal(html, wide = false) {
    const overlay = document.getElementById('modal-overlay');
    const box = document.getElementById('modal-box');
    box.style.maxWidth = wide ? '720px' : '560px';
    box.innerHTML = html;
    overlay.style.display = 'flex';
    // Close on overlay click
    overlay.onclick = (e) => { if (e.target === overlay) this.closeModal(); };
    // Close on Escape
    this._modalKeyHandler = (e) => { if (e.key === 'Escape') this.closeModal(); };
    document.addEventListener('keydown', this._modalKeyHandler);
    // Focus first input
    setTimeout(() => box.querySelector('input,select,textarea')?.focus(), 100);
  },

  closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('modal-box').innerHTML = '';
    if (this._modalKeyHandler) {
      document.removeEventListener('keydown', this._modalKeyHandler);
    }
  },

  toast(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    toast.className = `toast ${type}`;
    toast.textContent = `${icons[type] || ''} ${message}`;
    container.appendChild(toast);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => toast.classList.add('show'));
    });
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }, duration);
  },
};

/* ---- Boot ---- */
document.addEventListener('DOMContentLoaded', () => {
  App.init().catch(err => {
    console.error('App init failed:', err);
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f1117;color:#e8eaf0;text-align:center;padding:20px">
        <div>
          <div style="font-size:48px;margin-bottom:16px">❌</div>
          <h2 style="margin-bottom:8px">Failed to start MobilePOS</h2>
          <p style="color:#8892a4;margin-bottom:20px">${err.message}</p>
          <button onclick="location.reload()" style="background:#4f8ef7;border:none;color:#fff;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px">Reload App</button>
        </div>
      </div>
    `;
  });
});

</script>
<script>

// Inline Service Worker via blob URL
(function() {
  if (!("serviceWorker" in navigator)) return;
  const swCode = `/* ============================================
   MobilePOS - Service Worker
   Offline-first caching strategy
   ============================================ */

const CACHE_NAME = 'mobilepos-v1.0.0';
const ASSETS = [
  './',
  './index.html',
  './manifest.json',
  './css/main.css',
  './js/db.js',
  './js/wac.js',
  './js/app.js',
  './js/invoice-print.js',
  './js/pages/dashboard.js',
  './js/pages/pos.js',
  './js/pages/invoices.js',
  './js/pages/customers.js',
  './js/pages/inventory.js',
  './js/pages/purchases.js',
  './js/pages/expenses.js',
  './js/pages/reports.js',
  './js/pages/settings.js',
  './icons/icon-192.png',
  './icons/icon-512.png',
];

/* ---- Install: pre-cache all assets ---- */
self.addEventListener('install', (event) => {
  event.waitUntil(
    caches.open(CACHE_NAME).then(cache => {
      console.log('[SW] Pre-caching assets');
      return cache.addAll(ASSETS);
    }).then(() => self.skipWaiting())
  );
});

/* ---- Activate: clean old caches ---- */
self.addEventListener('activate', (event) => {
  event.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
    ).then(() => {
      console.log('[SW] Activated, old caches cleared');
      return self.clients.claim();
    })
  );
});

/* ---- Fetch: cache-first, then network ---- */
self.addEventListener('fetch', (event) => {
  // Only handle GET requests
  if (event.request.method !== 'GET') return;
  // Skip cross-origin
  if (!event.request.url.startsWith(self.location.origin)) return;

  event.respondWith(
    caches.match(event.request).then(cached => {
      if (cached) return cached;
      return fetch(event.request).then(response => {
        // Cache valid responses
        if (response && response.status === 200 && response.type === 'basic') {
          const clone = response.clone();
          caches.open(CACHE_NAME).then(cache => cache.put(event.request, clone));
        }
        return response;
      }).catch(() => {
        // Offline fallback for HTML navigation
        if (event.request.headers.get('accept')?.includes('text/html')) {
          return caches.match('./index.html');
        }
      });
    })
  );
});
`;
  const blob = new Blob([swCode], {type: "application/javascript"});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(function(reg) {
    console.log("[SW] Registered (blob)");
  }).catch(function(err) {
    console.warn("[SW] Registration failed:", err.message);
  });
