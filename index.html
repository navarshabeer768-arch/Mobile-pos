<title>MobilePOS — Distribution & Retail Manager</title>
<style>
/* ============================================
   MobilePOS - Main Stylesheet
   ============================================ */

:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1f2e;
  --bg-card: #1e2436;
  --bg-card2: #252b3d;
  --bg-hover: #2a3045;
  --bg-input: #1a1f2e;
  --accent: #4f8ef7;
  --accent-hover: #3a7de8;
  --accent-dim: rgba(79,142,247,0.15);
  --success: #22c55e;
  --success-dim: rgba(34,197,94,0.15);
  --warning: #f59e0b;
  --warning-dim: rgba(245,158,11,0.15);
  --danger: #ef4444;
  --danger-dim: rgba(239,68,68,0.15);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.15);
  --text-primary: #e8eaf0;
  --text-secondary: #8892a4;
  --text-muted: #5a6478;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --topbar-h: 56px;
  --sidebar-w: 240px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

/* ============================
   LOGIN SCREEN
   ============================ */
.screen { min-height: 100vh; }
.screen.active { display: flex; }

.login-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 100vh;
  padding: 24px;
  background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 100%);
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon { font-size: 52px; margin-bottom: 12px; }
.login-logo h1 { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.login-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.login-form {
  width: 100%;
  max-width: 360px;
  padding: 28px;
}

.hint-text {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 12px;
}

.offline-badge {
  margin-top: 20px;
  padding: 6px 16px;
  background: var(--warning-dim);
  border: 1px solid var(--warning);
  border-radius: 20px;
  font-size: 12px;
  color: var(--warning);
}

/* ============================
   CARD
   ============================ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}

/* ============================
   TOPBAR
   ============================ */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 100;
  backdrop-filter: blur(8px);
}

.menu-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: color .15s, background .15s;
}
.menu-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

.topbar-title {
  flex: 1;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.sync-status { font-size: 10px; cursor: default; }
.user-badge {
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-hover);
  padding: 3px 10px;
  border-radius: 12px;
}

.btn-icon {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 16px;
  padding: 4px 8px;
  border-radius: 6px;
  transition: all .15s;
}
.btn-icon:hover { background: var(--bg-hover); color: var(--danger); }

/* ============================
   SIDEBAR
   ============================ */
.sidebar {
  position: fixed;
  top: 0; left: -260px;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 200;
  transition: left .25s cubic-bezier(.4,0,.2,1);
  overflow-y: auto;
}
.sidebar.open { left: 0; }

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
}
.sidebar-close {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}
.sidebar-close:hover { color: var(--text-primary); background: var(--bg-hover); }

.nav-items { padding: 8px; flex: 1; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  text-decoration: none;
  transition: all .15s;
  margin-bottom: 2px;
  user-select: none;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-icon { font-size: 16px; width: 22px; text-align: center; }
.nav-divider { height: 1px; background: var(--border); margin: 8px 0; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.sidebar-footer small { color: var(--text-muted); font-size: 10px; }

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 199;
}
.sidebar-overlay.active { display: block; }

/* ============================
   PAGE CONTENT
   ============================ */
.page-content {
  margin-top: var(--topbar-h);
  padding: 20px;
  min-height: calc(100vh - var(--topbar-h));
}

/* ============================
   FORMS & INPUTS
   ============================ */
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
input, select, textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 10px 12px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font);
  transition: border-color .15s;
  outline: none;
  -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
input::placeholder { color: var(--text-muted); }
select option { background: var(--bg-secondary); }
textarea { resize: vertical; min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

/* ============================
   BUTTONS
   ============================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border-strong);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: all .15s;
  color: var(--text-primary);
  background: transparent;
  white-space: nowrap;
  user-select: none;
}
.btn:hover { background: var(--bg-hover); }
.btn:active { transform: scale(0.97); }

.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-success { background: var(--success); border-color: var(--success); color: #fff; }
.btn-success:hover { opacity: .9; }
.btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .9; }
.btn-warning { background: var(--warning); border-color: var(--warning); color: #000; }
.btn-warning:hover { opacity: .9; }
.btn-ghost { background: var(--bg-card2); border-color: var(--border); }
.btn-ghost:hover { border-color: var(--border-strong); background: var(--bg-hover); }
.btn-full { width: 100%; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 14px 24px; font-size: 15px; font-weight: 600; }

/* ============================
   TABLES
   ============================ */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 500px;
}
th {
  background: var(--bg-card2);
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-hover); }
.table-actions { display: flex; gap: 6px; }

/* ============================
   BADGES / PILLS
   ============================ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-success { background: var(--success-dim); color: var(--success); }
.badge-warning { background: var(--warning-dim); color: var(--warning); }
.badge-danger { background: var(--danger-dim); color: var(--danger); }
.badge-info { background: var(--accent-dim); color: var(--accent); }
.badge-gray { background: rgba(255,255,255,0.07); color: var(--text-secondary); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }

/* ============================
   STATS / METRIC CARDS
   ============================ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.stat-card.accent::before { background: var(--accent); }
.stat-card.success::before { background: var(--success); }
.stat-card.warning::before { background: var(--warning); }
.stat-card.danger::before { background: var(--danger); }
.stat-card.purple::before { background: var(--purple); }

.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.stat-sub {
  font-size: 11px;
  color: var(--text-secondary);
}
.stat-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 28px;
  opacity: 0.15;
}

/* ============================
   PAGE HEADER
   ============================ */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-header h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}
.page-header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ============================
   SEARCH BAR
   ============================ */
.search-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.search-input-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-input-wrap input {
  padding-left: 36px;
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
  pointer-events: none;
}

/* ============================
   POS SCREEN
   ============================ */
.pos-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 16px;
  height: calc(100vh - var(--topbar-h) - 40px);
  min-height: 500px;
}

.pos-left { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
.pos-right { display: flex; flex-direction: column; gap: 12px; overflow: hidden; }

.product-search-bar {
  display: flex;
  gap: 8px;
  align-items: center;
}
.product-search-bar input {
  flex: 1;
  padding: 12px 14px;
  font-size: 14px;
  border-radius: var(--radius-lg);
}

.category-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.cat-tab {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border-strong);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  background: transparent;
}
.cat-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.cat-tab:hover { border-color: var(--border-strong); color: var(--text-primary); }

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
  gap: 8px;
  overflow-y: auto;
  flex: 1;
  padding-right: 2px;
  align-content: start;
}

.product-tile {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
  position: relative;
}
.product-tile:hover { border-color: var(--accent); background: var(--bg-card2); transform: translateY(-1px); }
.product-tile:active { transform: scale(0.97); }
.product-tile.out-of-stock { opacity: 0.45; pointer-events: none; }

.pt-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  line-height: 1.3;

<script>
/* ============================================
   MobilePOS - Database Layer (IndexedDB)
   ============================================ */

const DB = (() => {
  const DB_NAME = 'MobilePOSDB';
  const DB_VERSION = 1;
  let db = null;

  const STORES = {
    users:      { keyPath: 'id', autoIncrement: true },
    customers:  { keyPath: 'id', autoIncrement: true },
    stores:     { keyPath: 'id', autoIncrement: true },
    products:   { keyPath: 'id', autoIncrement: true },
    categories: { keyPath: 'id', autoIncrement: true },
    suppliers:  { keyPath: 'id', autoIncrement: true },
    invoices:   { keyPath: 'id', autoIncrement: true },
    invoice_items: { keyPath: 'id', autoIncrement: true },
    purchases:  { keyPath: 'id', autoIncrement: true },
    purchase_items: { keyPath: 'id', autoIncrement: true },
    expenses:   { keyPath: 'id', autoIncrement: true },
    payments:   { keyPath: 'id', autoIncrement: true },
    stock_ledger: { keyPath: 'id', autoIncrement: true },
    settings:   { keyPath: 'key' },
    audit_log:  { keyPath: 'id', autoIncrement: true },
  };

  async function open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        Object.entries(STORES).forEach(([name, opts]) => {
          if (!d.objectStoreNames.contains(name)) {
            const store = d.createObjectStore(name, opts);
            // Indexes
            if (name === 'customers') store.createIndex('name', 'name', { unique: false });
            if (name === 'stores') store.createIndex('customer_id', 'customer_id', { unique: false });
            if (name === 'products') store.createIndex('category_id', 'category_id', { unique: false });
            if (name === 'products') store.createIndex('sku', 'sku', { unique: false });
            if (name === 'invoices') store.createIndex('customer_id', 'customer_id', { unique: false });
            if (name === 'invoices') store.createIndex('date', 'date', { unique: false });
            if (name === 'invoice_items') store.createIndex('invoice_id', 'invoice_id', { unique: false });
            if (name === 'purchases') store.createIndex('date', 'date', { unique: false });
            if (name === 'purchase_items') store.createIndex('purchase_id', 'purchase_id', { unique: false });
            if (name === 'expenses') store.createIndex('date', 'date', { unique: false });
            if (name === 'payments') store.createIndex('invoice_id', 'invoice_id', { unique: false });
            if (name === 'stock_ledger') store.createIndex('product_id', 'product_id', { unique: false });
            if (name === 'audit_log') store.createIndex('timestamp', 'timestamp', { unique: false });
          }
        });
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(db); };
      req.onerror = () => reject(req.error);
    });
  }

  function tx(storeName, mode = 'readonly') {
    const t = db.transaction(storeName, mode);
    return t.objectStore(storeName);
  }

  function req2promise(r) {
    return new Promise((res, rej) => {
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }

  async function getAll(storeName, indexName, indexVal) {
    const store = tx(storeName);
    if (indexName && indexVal !== undefined) {
      const idx = store.index(indexName);
      return req2promise(idx.getAll(indexVal));
    }
    return req2promise(store.getAll());
  }

  async function get(storeName, key) {
    return req2promise(tx(storeName).get(key));
  }

  async function put(storeName, data) {
    return req2promise(tx(storeName, 'readwrite').put(data));
  }

  async function add(storeName, data) {
    return req2promise(tx(storeName, 'readwrite').add(data));
  }

  async function remove(storeName, key) {
    return req2promise(tx(storeName, 'readwrite').delete(key));
  }

  async function clear(storeName) {
    return req2promise(tx(storeName, 'readwrite').clear());
  }

  async function getSetting(key, defaultVal = null) {
    const r = await get('settings', key);
    return r ? r.value : defaultVal;
  }

  async function setSetting(key, value) {
    return put('settings', { key, value });
  }

  async function audit(action, entity, entityId, details = '') {
    const user = App?.currentUser?.username || 'system';
    return add('audit_log', {
      action, entity, entity_id: entityId,
      user, timestamp: Date.now(),
      details: String(details)
    });
  }

  return { open, get, getAll, put, add, remove, clear, getSetting, setSetting, audit };
})();

/* ============================================
   MobilePOS - WAC Engine (Weighted Average Cost)
   ============================================ */

const WAC = (() => {

  /**
   * Recalculate WAC when a new purchase is added.
   * Formula: new_avg = (existing_stock * existing_avg + new_qty * new_cost) / (existing_stock + new_qty)
   * Edge case: if existing stock is 0, reset avg_cost to new_cost.
   */
  async function onPurchase(productId, newQty, newCost) {
    const product = await DB.get('products', productId);
    if (!product) throw new Error('Product not found: ' + productId);

    let newAvgCost;
    if (product.stock_qty <= 0) {
      // Zero-stock reset — fresh baseline
      newAvgCost = newCost;
    } else {
      const totalCostBefore = product.avg_cost * product.stock_qty;
      const totalCostNew = newCost * newQty;
      const totalQty = product.stock_qty + newQty;
      newAvgCost = (totalCostBefore + totalCostNew) / totalQty;
    }

    // Round to 4 decimal places for accounting precision
    newAvgCost = Math.round(newAvgCost * 10000) / 10000;

    const newStock = product.stock_qty + newQty;

    // Update product
    await DB.put('products', {
      ...product,
      avg_cost: newAvgCost,
      stock_qty: newStock,
    });

    // Log to stock ledger
    await DB.add('stock_ledger', {
      product_id: productId,
      type: 'purchase',
      qty: +newQty,
      cost_at_entry: newCost,
      wac_after: newAvgCost,
      stock_after: newStock,
      timestamp: Date.now(),
    });

    return { newAvgCost, newStock };
  }

  /**
   * Process a sale — decrease stock, record COGS based on WAC.
   * Returns { cogs, revenue, profit, newStock }
   */
  async function onSale(productId, saleQty, salePrice) {
    const product = await DB.get('products', productId);
    if (!product) throw new Error('Product not found: ' + productId);
    if (product.stock_qty < saleQty) throw new Error(`Insufficient stock for "${product.name}". Available: ${product.stock_qty}`);

    const cogs = product.avg_cost * saleQty;
    const revenue = salePrice * saleQty;
    const profit = revenue - cogs;
    const newStock = product.stock_qty - saleQty;

    await DB.put('products', { ...product, stock_qty: newStock });

    await DB.add('stock_ledger', {
      product_id: productId,
      type: 'sale',
      qty: -saleQty,
      cost_at_entry: product.avg_cost,
      wac_after: product.avg_cost, // WAC doesn't change on sale
      stock_after: newStock,
      timestamp: Date.now(),
    });

    return { cogs, revenue, profit, newStock };
  }

  /**
   * Get suggested selling price for a product based on avg_cost + margin.
   */
  async function getSuggestedPrice(productId) {
    const product = await DB.get('products', productId);
    if (!product) return null;
    const cat = await DB.get('categories', product.category_id);
    const margin = cat ? cat.default_margin : 20;
    return Math.ceil(product.avg_cost * (1 + margin / 100) * 100) / 100;
  }

  /**
   * Get profit info for display in POS.
   */
  function getProfitInfo(avgCost, salePrice, qty = 1) {
    const profitPerUnit = salePrice - avgCost;
    const profitPct = avgCost > 0 ? (profitPerUnit / avgCost * 100) : 0;
    return {
      profitPerUnit: Math.round(profitPerUnit * 100) / 100,
      profitPct: Math.round(profitPct * 10) / 10,
      totalProfit: Math.round(profitPerUnit * qty * 100) / 100,
    };
  }

  /**
   * Reverse a sale (void/cancel) — restore stock, no WAC change needed
   * since WAC only changes on purchases.
   */
  async function reverseSale(productId, qty) {
    const product = await DB.get('products', productId);
    if (!product) return;
    const newStock = product.stock_qty + qty;
    await DB.put('products', { ...product, stock_qty: newStock });
    await DB.add('stock_ledger', {
      product_id: productId,
      type: 'reversal',
      qty: +qty,
      cost_at_entry: product.avg_cost,
      wac_after: product.avg_cost,
      stock_after: newStock,
      timestamp: Date.now(),
    });
  }

  return { onPurchase, onSale, getSuggestedPrice, getProfitInfo, reverseSale };
})();

      const cat = (this._cats || []).find(c => c.id === p.category_id);

          </div>
        </div>
      `;

  async addToCart(productId) {
    const p = this._products.find(x => x.id === productId);
    if (!p || p.stock_qty <= 0) { UI.toast('Out of stock', 'error'); return; }

    const existing = this.cart.find(c => c.product_id === productId);
    if (existing) {
      if (existing.qty >= p.stock_qty) { UI.toast('Max stock reached', 'warning'); return; }
      existing.qty++;
    } else {
      this.cart.push({
        product_id: productId,
        name: p.name,
        avg_cost: p.avg_cost,
        unit_price: p.selling_price,
        qty: 1,
        max_qty: p.stock_qty,

    this.renderCart();

  changeQty(idx, delta) {
    const item = this.cart[idx];
    if (!item) return;
    item.qty = Math.max(1, Math.min(item.max_qty, item.qty + delta));
    this.renderCart();
    this.recalc();

  renderCart() {
    const listEl = document.getElementById('cart-list');
    const countEl = document.getElementById('cart-count');
    if (!listEl) return;

    const total = this.cart.reduce((s, i) => s + i.qty, 0);
    if (countEl) countEl.textContent = `${total} item${total !== 1 ? 's' : ''}`;

    if (this.cart.length === 0) {
      listEl.innerHTML = '<div class="cart-empty">Add products to start billing</div>';
      return;
    }

    listEl.innerHTML = this.cart.map((item, idx) => {
      const lineTotal = item.unit_price * item.qty;
      const profit = WAC.getProfitInfo(item.avg_cost, item.unit_price, item.qty);
      return `
        <div class="cart-item">
          <div style="flex:1;min-width:0">
            <div class="ci-name">${item.name}</div>
            <div class="ci-profit">+${this.currency} ${fmt(profit.totalProfit)} profit</div>
          </div>
          <div class="ci-controls">
            <button class="qty-btn" onclick="POSPage.changeQty(${idx},-1)">−</button>
            <span class="qty-display">${item.qty}</span>
            <button class="qty-btn" onclick="POSPage.changeQty(${idx},1)">+</button>
          </div>
          <div class="ci-price">${this.currency} ${fmt(lineTotal)}</div>
          <span class="ci-remove" onclick="POSPage.removeFromCart(${idx})">✕</span>
        </div>
      `;
    }).join('');
  },

  recalc() {
    const currency = this.currency || 'QAR';
    const subtotal = this.cart.reduce((s, i) => s + i.unit_price * i.qty, 0);
    const discountPct = parseFloat(document.getElementById('cart-discount')?.value || 0);
    const discountAmt = subtotal * discountPct / 100;
    const afterDiscount = subtotal - discountAmt;
    const taxEnabled = document.getElementById('tax-row')?.style.display !== 'none';
    const tax = taxEnabled ? afterDiscount * 0.05 : 0;
    const total = afterDiscount + tax;
    const totalProfit = this.cart.reduce((s, i) => {
      return s + WAC.getProfitInfo(i.avg_cost, i.unit_price, i.qty).totalProfit;
    }, 0);
    const profitAfterDiscount = totalProfit - discountAmt;

    document.getElementById('cart-subtotal').textContent = `${currency} ${fmt(subtotal)}`;
    document.getElementById('cart-tax').textContent = `${currency} ${fmt(tax)}`;
    document.getElementById('cart-total').textContent = `${currency} ${fmt(total)}`;
    const profitEl = document.getElementById('cart-profit');
    if (profitEl) {
      profitEl.textContent = `${currency} ${fmt(profitAfterDiscount)}`;
      profitEl.style.color = profitAfterDiscount >= 0 ? 'var(--success)' : 'var(--danger)';
    }
    this._totals = { subtotal, discountAmt, tax, total, profit: profitAfterDiscount };
  },

  async loadCustomers() {
    const customers = await DB.getAll('customers');
    const sel = document.getElementById('pos-customer');
    if (!sel) return;
    sel.innerHTML = '<option value="">— Walk-in Customer —</option>';
    customers.forEach(c => {
      sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    });
    this._customers = customers;
  },

  async onCustomerChange() {
    const custId = parseInt(document.getElementById('pos-customer').value);
    const storeSel = document.getElementById('pos-store');
    const storeInfo = document.getElementById('pos-store-info');

    if (!custId) {
      this.selectedCustomer = null;
      this.selectedStore = null;
      storeSel.style.display = 'none';
      storeInfo.style.display = 'none';
      return;
    }

    this.selectedCustomer = this._customers.find(c => c.id === custId);
    const stores = await DB.getAll('stores', 'customer_id', custId);
    storeSel.innerHTML = '<option value="">— Select Branch/Store —</option>';
    stores.forEach(s => {
      storeSel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
    });
    storeSel.style.display = 'block';
    storeInfo.style.display = 'none';
    this._stores = stores;
  },

  onStoreChange() {
    const storeId = parseInt(document.getElementById('pos-store').value);
    const storeInfo = document.getElementById('pos-store-info');
    if (!storeId) { this.selectedStore = null; storeInfo.style.display = 'none'; return; }
    this.selectedStore = this._stores.find(s => s.id === storeId);
    if (this.selectedStore) {
      storeInfo.style.display = 'block';
      storeInfo.innerHTML = `📍 ${this.selectedStore.address || ''} &nbsp;|&nbsp; 📞 ${this.selectedStore.phone || ''} &nbsp;|&nbsp; 👤 ${this.selectedStore.contact_person || ''}`;
    }
  },

  clearCart() {
    if (this.cart.length === 0) return;
    if (!confirm('Clear cart?')) return;
    this.cart = [];
    this.renderCart();
    this.recalc();
  },

  async saveDraft() {
    if (this.cart.length === 0) { UI.toast('Cart is empty', 'warning'); return; }
    localStorage.setItem('pos_draft', JSON.stringify({ cart: this.cart, customer_id: this.selectedCustomer?.id, store_id: this.selectedStore?.id }));
    UI.toast('Draft saved', 'success');
  },

  async checkout(paymentMode) {
    if (this.cart.length === 0) { UI.toast('Cart is empty', 'warning'); return; }

    // Validate stock availability
    for (const item of this.cart) {
      const p = await DB.get('products', item.product_id);
      if (!p || p.stock_qty < item.qty) {
        UI.toast(`Insufficient stock for "${item.name}"`, 'error');
        return;
      }
    }

    const settings = await App.getSettings();
    const counter = await DB.getSetting('invoice_counter', 1000);
    const prefix = settings.invoice_prefix || 'INV';
    const invoiceNo = `${prefix}-${String(counter + 1).padStart(5, '0')}`;
    const { subtotal, discountAmt, tax, total, profit } = this._totals || { subtotal: 0, discountAmt: 0, tax: 0, total: 0, profit: 0 };

    const today = new Date().toISOString().slice(0, 10);
    const invoiceData = {
      invoice_no: invoiceNo,
      date: today,
      customer_id: this.selectedCustomer?.id || null,
      customer_name: this.selectedCustomer?.name || 'Walk-in Customer',
      store_id: this.selectedStore?.id || null,
      store_name: this.selectedStore?.name || '',
      payment_mode: paymentMode,
      status: paymentMode === 'cash' ? 'paid' : 'unpaid',
      subtotal, discount: discountAmt, tax, total, profit,
      notes: '',
      created_by: App.currentUser?.username || 'staff',
      created_at: Date.now(),
    };

    // Save invoice
    const invoiceId = await DB.add('invoices', invoiceData);

    // Save items & process stock
    let totalProfit = 0;
    for (const item of this.cart) {
      const lineTotal = item.unit_price * item.qty;
      const p = WAC.getProfitInfo(item.avg_cost, item.unit_price, item.qty);
      await DB.add('invoice_items', {
        invoice_id: invoiceId,
        product_id: item.product_id,
        product_name: item.name,
        qty: item.qty,
        unit_price: item.unit_price,
        avg_cost: item.avg_cost,
        line_total: lineTotal,
        profit: p.totalProfit,
      });
      // Deduct stock via WAC
      await WAC.onSale(item.product_id, item.qty, item.unit_price);
      totalProfit += p.totalProfit;
    }

    // Update invoice profit with accurate figure
    await DB.put('invoices', { ...invoiceData, id: invoiceId, profit: totalProfit - discountAmt });

    // Update customer outstanding if credit
    if (paymentMode === 'credit' && this.selectedCustomer) {
      const cust = await DB.get('customers', this.selectedCustomer.id);
      await DB.put('customers', { ...cust, outstanding: (cust.outstanding || 0) + total });
    }

    // Increment invoice counter
    await DB.setSetting('invoice_counter', counter + 1);
    await DB.audit('create', 'invoice', invoiceId, `${invoiceNo} — ${total}`);

    UI.toast(`Invoice ${invoiceNo} saved!`, 'success');

    // Reload products (stock updated)
    await this.loadProducts();

    // Show print option
    this.cart = [];
    this.renderCart();
    this.recalc();

    // Ask to print
    setTimeout(() => {
      if (confirm(`Invoice ${invoiceNo} saved! Print invoice?`)) {
        InvoicePrint.printInvoice(invoiceId);
      }
    }, 300);
  },
};

      const matchStatus = !status || text.includes(status);
      const matchMode = !mode || text.includes(mode);
      const matchDate = !date || text.includes(date);
      r.style.display = (matchQ && matchStatus && matchMode && matchDate) ? '' : 'none';
    });

  async viewInvoice(id) {
    const inv = await DB.get('invoices', id);
    if (!inv) return;
    const items = await DB.getAll('invoice_items', 'invoice_id', id);
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';

    UI.modal(`

        <div><span class="text-muted">Status:</span> <span class="badge ${inv.status === 'paid' ? 'badge-success' : 'badge-warning'}">${inv.status}</span></div>
        <div><span class="text-muted">Created by:</span> ${inv.created_by}</div>
      </div>

          <thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th><th>Profit</th></tr></thead>
          <tbody>
            ${items.map(it => `
              <tr>
                <td>${it.product_name}</td>
                <td>${it.qty}</td>
                <td>${currency} ${fmt(it.unit_price)}</td>
                <td>${currency} ${fmt(it.line_total)}</td>
                <td class="text-success">${currency} ${fmt(it.profit)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:12px;text-align:right;font-size:13px">
        <div>Subtotal: <strong>${currency} ${fmt(inv.subtotal)}</strong></div>
        ${inv.discount > 0 ? `<div>Discount: <span class="text-danger">−${currency} ${fmt(inv.discount)}</span></div>` : ''}
        ${inv.tax > 0 ? `<div>VAT: ${currency} ${fmt(inv.tax)}</div>` : ''}
        <div style="font-size:16px;margin-top:6px">Total: <strong class="text-accent">${currency} ${fmt(inv.total)}</strong></div>
        <div class="text-success text-sm">Profit: ${currency} ${fmt(inv.profit)}</div>

  async markPaid(id) {
    const inv = await DB.get('invoices', id);
    if (!inv) return;
    await DB.put('invoices', { ...inv, status: 'paid' });
    // Add payment record
    await DB.add('payments', { invoice_id: id, amount: inv.total, date: new Date().toISOString().slice(0,10), method: 'cash', timestamp: Date.now() });
    // Update customer outstanding
    if (inv.customer_id) {
      const cust = await DB.get('customers', inv.customer_id);
      if (cust) await DB.put('customers', { ...cust, outstanding: Math.max(0, (cust.outstanding || 0) - inv.total) });
    }
    await DB.audit('paid', 'invoice', id, inv.invoice_no);
    UI.toast('Invoice marked as paid', 'success');
    UI.navigate('invoices');
  },

  async voidInvoice(id) {
    if (!confirm('Void this invoice? Stock will be restored.')) return;
    const inv = await DB.get('invoices', id);
    const items = await DB.getAll('invoice_items', 'invoice_id', id);
    for (const it of items) {
      await WAC.reverseSale(it.product_id, it.qty);
    }
    await DB.put('invoices', { ...inv, status: 'void' });
    if (inv.payment_mode === 'credit' && inv.customer_id) {
      const cust = await DB.get('customers', inv.customer_id);
      if (cust) await DB.put('customers', { ...cust, outstanding: Math.max(0, (cust.outstanding || 0) - inv.total) });
    }
    await DB.audit('void', 'invoice', id, inv.invoice_no);
    UI.toast('Invoice voided and stock restored', 'warning');
    UI.navigate('invoices');
  },
};

/* ============================================
   MobilePOS - Inventory Page
   ============================================ */

const InventoryPage = {
  async render() {
    const products = await DB.getAll('products');
    const categories = await DB.getAll('categories');
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    const catMap = {};
    categories.forEach(c => { catMap[c.id] = c; });

    const active = products.filter(p => p.active !== false);
    const lowStock = active.filter(p => p.stock_qty <= (p.min_stock || 5));
    const totalValue = active.reduce((s, p) => s + (p.avg_cost * p.stock_qty), 0);
    const totalRetailValue = active.reduce((s, p) => s + (p.selling_price * p.stock_qty), 0);

    return `
      <div class="page-header">
        <h2>📦 Inventory</h2>
        <div class="page-header-actions">
          <button class="btn btn-ghost" onclick="InventoryPage.importCSV()">📥 Import CSV</button>
          <button class="btn btn-primary" onclick="InventoryPage.openForm()">+ Add Product</button>
        </div>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
        <div class="stat-card accent">
          <div class="stat-label">Total Products</div>
          <div class="stat-value">${active.length}</div>
        </div>
        <div class="stat-card success">
          <div class="stat-label">Stock Value (Cost)</div>
          <div class="stat-value" style="font-size:18px">${currency} ${fmt0(totalValue)}</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-label">Retail Value</div>
          <div class="stat-value" style="font-size:18px">${currency} ${fmt0(totalRetailValue)}</div>
        </div>
        <div class="stat-card ${lowStock.length > 0 ? 'danger' : 'success'}">
          <div class="stat-label">Low Stock</div>
          <div class="stat-value">${lowStock.length}</div>
        </div>
      </div>

      <div class="search-bar">
        <div class="search-input-wrap flex-1">
          <span class="search-icon">🔍</span>
          <input type="text" id="inv-search" placeholder="Search products..." oninput="InventoryPage.filter()">
        </div>
        <select id="inv-cat-filter" onchange="InventoryPage.filter()" style="width:160px">
          <option value="">All Categories</option>
          ${categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
        </select>
        <select id="inv-stock-filter" onchange="InventoryPage.filter()" style="width:150px">
          <option value="">All Stock</option>
          <option value="low">Low Stock</option>
          <option value="out">Out of Stock</option>
          <option value="ok">In Stock</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Product</th><th>SKU</th><th>Category</th>
              <th>Avg Cost (WAC)</th><th>Selling Price</th><th>Margin</th>
              <th>Stock</th><th>Min</th><th>Value</th><th>Actions</th>
            </tr></thead>
            <tbody id="inventory-tbody">
              ${active.length === 0 ? `<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--text-muted)">No products</td></tr>` :
              active.map(p => {
                const margin = p.avg_cost > 0 ? ((p.selling_price - p.avg_cost) / p.avg_cost * 100) : 0;
                const stockStatus = p.stock_qty <= 0 ? 'out' : p.stock_qty <= (p.min_stock || 5) ? 'low' : 'ok';
                const cat = catMap[p.category_id];
                return `
                  <tr data-cat="${p.category_id}" data-stock="${stockStatus}">
                    <td><span class="fw-medium">${p.name}</span></td>
                    <td><span class="text-muted text-sm">${p.sku || '—'}</span></td>
                    <td><span class="badge badge-gray">${cat?.name || '—'}</span></td>
                    <td>
                      <div class="fw-bold text-warning">${currency} ${fmt(p.avg_cost)}</div>
                      <div class="text-xs text-muted">WAC</div>
                    </td>
                    <td class="fw-bold text-accent">${currency} ${fmt(p.selling_price)}</td>
                    <td><span class="badge ${margin >= 20 ? 'badge-success' : margin >= 10 ? 'badge-warning' : 'badge-danger'}">${fmt(margin)}%</span></td>
                    <td>
                      <span class="fw-bold ${stockStatus === 'out' ? 'text-danger' : stockStatus === 'low' ? 'text-warning' : 'text-success'}">
                        ${p.stock_qty}
                      </span>
                    </td>
                    <td class="text-muted text-sm">${p.min_stock || 5}</td>
                    <td class="text-sm">${currency} ${fmt(p.avg_cost * p.stock_qty)}</td>
                    <td>
                      <div class="table-actions">
                        <button class="btn btn-ghost btn-sm" onclick="InventoryPage.openForm(${p.id})" title="Edit">✏️</button>
                        <button class="btn btn-ghost btn-sm" onclick="InventoryPage.viewLedger(${p.id})" title="Stock History">📊</button>
                        ${App.currentUser?.role === 'admin' ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="InventoryPage.deactivate(${p.id})" title="Deactivate">🗑</button>` : ''}
                      </div>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  },

  filter() {
    const q = (document.getElementById('inv-search')?.value || '').toLowerCase();
    const cat = document.getElementById('inv-cat-filter')?.value || '';
    const stock = document.getElementById('inv-stock-filter')?.value || '';
    document.querySelectorAll('#inventory-tbody tr').forEach(r => {
      const text = r.textContent.toLowerCase();
      const matchQ = !q || text.includes(q);
      const matchCat = !cat || r.dataset.cat === cat;
      const matchStock = !stock || r.dataset.stock === stock;
      r.style.display = (matchQ && matchCat && matchStock) ? '' : 'none';
    });
  },

  async openForm(id = null) {
    const p = id ? await DB.get('products', id) : {};
    const categories = await DB.getAll('categories');
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';

    UI.modal(`
      <div class="modal-title">${id ? 'Edit Product' : 'New Product'}</div>
      <div class="form-group"><label>Product Name *</label>
        <input id="pf-name" value="${p.name || ''}" placeholder="Samsung Galaxy A55..."></div>
      <div class="form-row">
        <div class="form-group"><label>SKU / Code</label>
          <input id="pf-sku" value="${p.sku || ''}" placeholder="SAM-A55"></div>
        <div class="form-group"><label>Barcode</label>
          <input id="pf-barcode" value="${p.barcode || ''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Category</label>
          <select id="pf-cat">
            ${categories.map(c => `<option value="${c.id}" ${c.id === p.category_id ? 'selected' : ''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Min Stock Alert</label>
          <input id="pf-min" type="number" value="${p.min_stock || 5}" min="0"></div>
      </div>
      ${!id ? `
        <div class="form-row">
          <div class="form-group"><label>Initial Stock Qty</label>
            <input id="pf-stock" type="number" value="0" min="0"></div>
          <div class="form-group"><label>Purchase Cost (${currency})</label>
            <input id="pf-cost" type="number" value="0" step="0.01" min="0" oninput="InventoryPage.suggestPrice()"></div>
        </div>
      ` : `
        <div class="form-group"><label>Avg Cost (WAC) — Read Only</label>
          <input value="${currency} ${fmt(p.avg_cost || 0)}" readonly style="opacity:0.6;cursor:not-allowed"></div>
        <div class="form-group" style="font-size:11px;color:var(--text-muted);margin-top:-10px">⚠️ Avg cost only changes via Purchases (WAC). Use Purchase module to add stock.</div>
      `}
      <div class="form-row">
        <div class="form-group"><label>Selling Price (${currency}) *</label>
          <input id="pf-price" type="number" value="${p.selling_price || ''}" step="0.01" min="0"></div>
        <div class="form-group"><label>Margin % (auto)</label>
          <input id="pf-margin" type="text" readonly style="opacity:0.6" value="—" placeholder="Auto-calculated"></div>
      </div>
      <div id="pf-suggest" style="font-size:11px;color:var(--success);margin-top:-8px;margin-bottom:8px"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="InventoryPage.save(${id || 'null'})">Save Product</button>
      </div>
    `);
    if (!id) this.suggestPrice();
  },

  suggestPrice() {
    const cost = parseFloat(document.getElementById('pf-cost')?.value) || 0;
    const catId = parseInt(document.getElementById('pf-cat')?.value);
    const suggestEl = document.getElementById('pf-suggest');
    const priceEl = document.getElementById('pf-price');
    if (!cost || !suggestEl) return;

    DB.getAll('categories').then(cats => {
      const cat = cats.find(c => c.id === catId);
      const margin = cat?.default_margin || 20;
      const suggested = Math.ceil(cost * (1 + margin / 100) * 100) / 100;
      suggestEl.textContent = `💡 Suggested price at ${margin}% margin: ${fmt(suggested)}`;
      if (!priceEl.value || parseFloat(priceEl.value) === 0) priceEl.value = suggested;
      const price = parseFloat(priceEl.value) || suggested;
      const actualMargin = cost > 0 ? ((price - cost) / cost * 100) : 0;
      const marginEl = document.getElementById('pf-margin');
      if (marginEl) marginEl.value = fmt(actualMargin) + '%';
    });
  },

  async save(id) {
    const name = document.getElementById('pf-name')?.value.trim();
    if (!name) { UI.toast('Product name required', 'error'); return; }
    const sellingPrice = parseFloat(document.getElementById('pf-price')?.value) || 0;
    const catId = parseInt(document.getElementById('pf-cat')?.value);

    if (id) {
      const existing = await DB.get('products', id);
      await DB.put('products', {
        ...existing,
        name,
        sku: document.getElementById('pf-sku').value,
        barcode: document.getElementById('pf-barcode').value,
        category_id: catId,
        selling_price: sellingPrice,
        min_stock: parseInt(document.getElementById('pf-min').value) || 5,
      });
      await DB.audit('update', 'product', id, name);
    } else {
      const cost = parseFloat(document.getElementById('pf-cost')?.value) || 0;
      const stock = parseInt(document.getElementById('pf-stock')?.value) || 0;
      const newId = await DB.add('products', {
        name,
        sku: document.getElementById('pf-sku').value,
        barcode: document.getElementById('pf-barcode').value,
        category_id: catId,
        avg_cost: cost,
        selling_price: sellingPrice,
        stock_qty: stock,
        min_stock: parseInt(document.getElementById('pf-min').value) || 5,
        active: true,
        created_at: Date.now(),
      });
      if (stock > 0 && cost > 0) {
        await DB.add('stock_ledger', { product_id: newId, type: 'initial', qty: stock, cost_at_entry: cost, wac_after: cost, stock_after: stock, timestamp: Date.now() });
      }
      await DB.audit('create', 'product', newId, name);
    }
    UI.toast('Product saved', 'success');
    UI.closeModal();
    UI.navigate('inventory');
  },

  async viewLedger(productId) {
    const p = await DB.get('products', productId);
    const ledger = await DB.getAll('stock_ledger', 'product_id', productId);
    const sorted = [...ledger].sort((a, b) => b.timestamp - a.timestamp).slice(0, 50);
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';

    UI.modal(`
      <div class="modal-title">📊 Stock History — ${p.name}</div>
      <div style="display:flex;gap:12px;margin-bottom:12px;font-size:12px">
        <span>Current Stock: <strong class="text-success">${p.stock_qty}</strong></span>
        <span>Avg Cost (WAC): <strong class="text-warning">${currency} ${fmt(p.avg_cost)}</strong></span>
        <span>Selling Price: <strong class="text-accent">${currency} ${fmt(p.selling_price)}</strong></span>
      </div>
      <div class="table-wrap" style="max-height:380px;overflow-y:auto">
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Qty</th><th>Cost at Entry</th><th>WAC After</th><th>Stock After</th></tr></thead>
          <tbody>
            ${sorted.length === 0 ? '<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">No records</td></tr>' :
              sorted.map(l => `
                <tr>
                  <td class="text-sm text-muted">${new Date(l.timestamp).toLocaleDateString('en')}</td>
                  <td><span class="badge ${l.type === 'purchase' || l.type === 'initial' ? 'badge-success' : l.type === 'sale' ? 'badge-danger' : 'badge-warning'}">${l.type}</span></td>
                  <td class="${l.qty > 0 ? 'text-success' : 'text-danger'}">${l.qty > 0 ? '+' : ''}${l.qty}</td>
                  <td>${currency} ${fmt(l.cost_at_entry)}</td>
                  <td class="text-warning">${currency} ${fmt(l.wac_after)}</td>
                  <td>${l.stock_after}</td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Close</button>
      </div>
    `);
  },

  async deactivate(id) {
    if (!confirm('Remove product from active list?')) return;
    const p = await DB.get('products', id);
    await DB.put('products', { ...p, active: false });
    UI.toast('Product deactivated', 'warning');
    UI.navigate('inventory');
  },

  importCSV() {
    UI.modal(`
      <div class="modal-title">📥 Import Products (CSV)</div>
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">
        CSV format: <code>name,sku,category,cost,selling_price,stock_qty</code>
      </p>
      <div class="form-group">
        <label>Select CSV File</label>
        <input type="file" id="csv-file" accept=".csv" style="padding:8px">
      </div>
      <div id="csv-preview" style="font-size:11px;color:var(--text-secondary)"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="InventoryPage.processCSV()">Import</button>
      </div>
    `);
  },

  async processCSV() {
    const file = document.getElementById('csv-file')?.files[0];
    if (!file) { UI.toast('No file selected', 'error'); return; }
    const text = await file.text();
    const lines = text.trim().split('\n').slice(1); // skip header
    const categories = await DB.getAll('categories');
    let count = 0;
    for (const line of lines) {
      const [name, sku, catName, cost, price, stock] = line.split(',').map(s => s.trim().replace(/"/g, ''));
      if (!name) continue;
      const cat = categories.find(c => c.name.toLowerCase() === (catName || '').toLowerCase());
      await DB.add('products', {
        name, sku: sku || '', category_id: cat?.id || categories[0]?.id,
        avg_cost: parseFloat(cost) || 0, selling_price: parseFloat(price) || 0,
        stock_qty: parseInt(stock) || 0, min_stock: 5, active: true, created_at: Date.now(),
      });
      count++;
    }
    UI.toast(`Imported ${count} products`, 'success');
    UI.closeModal();
    UI.navigate('inventory');
  },
};

   MobilePOS - Purchases Page

const PurchasesPage = {
  items: [],

  async render() {
    const purchases = await DB.getAll('purchases');
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';
    const sorted = [...purchases].sort((a, b) => b.created_at - a.created_at);

    return `
      <div class="page-header">
        <h2>🚚 Purchases</h2>
        <button class="btn btn-primary" onclick="PurchasesPage.openForm()">+ New Purchase</button>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Invoice #</th><th>Supplier</th><th>Date</th>
              <th>Items</th><th>Total</th><th>Actions</th>
            </tr></thead>
            <tbody>
              ${sorted.length === 0 ? `<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">No purchases yet</td></tr>` :
              sorted.map(pu => `
                <tr>
                  <td class="text-accent fw-bold">${pu.invoice_no || '—'}</td>
                  <td>${pu.supplier_name || '—'}</td>
                  <td class="text-sm text-muted">${pu.date}</td>
                  <td class="text-sm">${pu.item_count || '—'} items</td>
                  <td class="fw-bold">${currency} ${fmt(pu.total)}</td>
                  <td>
                    <div class="table-actions">
                      <button class="btn btn-ghost btn-sm" onclick="PurchasesPage.viewPurchase(${pu.id})">👁 View</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  },

  async openForm() {
    this.items = [];
    const suppliers = await DB.getAll('suppliers');
    const products = await DB.getAll('products');
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';

    UI.modal(`
      <div class="modal-title">🚚 New Purchase Entry</div>
      <div class="form-row">
        <div class="form-group"><label>Supplier</label>
          <select id="pu-supplier" style="width:100%">
            <option value="">— Select Supplier —</option>
            ${suppliers.map(s => `<option value="${s.id}" data-name="${s.name}">${s.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Supplier Invoice #</label>
          <input id="pu-invno" placeholder="SUP-INV-001"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date</label>
          <input id="pu-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label>Notes</label>
          <input id="pu-notes" placeholder="Optional notes..."></div>
      </div>

      <div class="divider"></div>
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">📦 Products</div>

      <div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;margin-bottom:8px;font-size:11px;color:var(--text-muted)">
        <span>Product</span><span>Qty</span><span>Unit Cost (${currency})</span><span></span>
      </div>
      <div id="pu-items-list" style="display:flex;flex-direction:column;gap:6px"></div>

      <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%" onclick="PurchasesPage.addItem()">+ Add Product</button>

      <div style="margin-top:12px;text-align:right;font-size:14px;font-weight:600">
        Total: <span id="pu-total" class="text-accent">${currency} 0.00</span>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="PurchasesPage.savePurchase()">✅ Save & Update Stock</button>
      </div>
    `, true);

    this._products = products;
    this._currency = currency;
    this.addItem();
  },

  addItem() {
    const idx = this.items.length;
    this.items.push({ product_id: null, qty: 1, cost: 0 });
    const el = document.getElementById('pu-items-list');
    if (!el) return;
    const div = document.createElement('div');
    div.id = `pu-item-${idx}`;
    div.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;align-items:center';
    div.innerHTML = `
      <select onchange="PurchasesPage.itemChange(${idx},'product',this.value)" style="font-size:12px">
        <option value="">— Select Product —</option>
        ${(this._products || []).filter(p => p.active !== false).map(p =>
          `<option value="${p.id}" data-cost="${p.avg_cost}">${p.name} (Stock: ${p.stock_qty})</option>`
        ).join('')}
      </select>
      <input type="number" min="1" value="1" placeholder="Qty" onchange="PurchasesPage.itemChange(${idx},'qty',this.value)" style="font-size:12px;text-align:center">
      <input type="number" min="0" step="0.01" value="" placeholder="Cost" onchange="PurchasesPage.itemChange(${idx},'cost',this.value)" style="font-size:12px" id="pu-cost-${idx}">
      <button class="btn btn-ghost btn-sm" style="padding:6px 8px;color:var(--danger)" onclick="PurchasesPage.removeItem(${idx})">✕</button>
    `;
    el.appendChild(div);
  },

  itemChange(idx, field, val) {
    if (!this.items[idx]) return;
    if (field === 'product') {
      this.items[idx].product_id = parseInt(val);
      const prod = (this._products || []).find(p => p.id === parseInt(val));
      if (prod) {
        const costEl = document.getElementById(`pu-cost-${idx}`);
        if (costEl && !costEl.value) costEl.value = prod.avg_cost;
        this.items[idx].cost = prod.avg_cost;
      }
    } else if (field === 'qty') {
      this.items[idx].qty = parseInt(val) || 1;
    } else if (field === 'cost') {
      this.items[idx].cost = parseFloat(val) || 0;
    }
    this.recalcTotal();
  },

  removeItem(idx) {
    const el = document.getElementById(`pu-item-${idx}`);
    if (el) el.remove();
    this.items[idx] = null;
    this.recalcTotal();
  },

  recalcTotal() {
    const total = (this.items || []).filter(Boolean).reduce((s, i) => s + (i.qty || 0) * (i.cost || 0), 0);
    const el = document.getElementById('pu-total');
    if (el) el.textContent = `${this._currency} ${fmt(total)}`;
  },

  async savePurchase() {
    const validItems = (this.items || []).filter(i => i && i.product_id && i.qty > 0 && i.cost >= 0);
    if (validItems.length === 0) { UI.toast('Add at least one product', 'error'); return; }

    const supplierSel = document.getElementById('pu-supplier');
    const supplierId = parseInt(supplierSel?.value) || null;
    const supplierName = supplierSel?.selectedOptions[0]?.dataset.name || '';
    const date = document.getElementById('pu-date')?.value || new Date().toISOString().slice(0,10);
    const invoiceNo = document.getElementById('pu-invno')?.value || '';
    const notes = document.getElementById('pu-notes')?.value || '';
    const total = validItems.reduce((s, i) => s + i.qty * i.cost, 0);

    const purchaseId = await DB.add('purchases', {
      supplier_id: supplierId,
      supplier_name: supplierName,
      invoice_no: invoiceNo,
      date, notes, total,
      item_count: validItems.length,
      created_by: App.currentUser?.username || 'staff',
      created_at: Date.now(),
    });

    for (const item of validItems) {
      await DB.add('purchase_items', {
        purchase_id: purchaseId,
        product_id: item.product_id,
        qty: item.qty,
        unit_cost: item.cost,
        line_total: item.qty * item.cost,
      });
      // WAC recalculation + stock update
      const result = await WAC.onPurchase(item.product_id, item.qty, item.cost);
    }

    await DB.audit('create', 'purchase', purchaseId, `${invoiceNo} — ${total}`);
    UI.toast(`Purchase saved! Stock updated for ${validItems.length} product(s)`, 'success');
    UI.closeModal();
    UI.navigate('purchases');
  },

  async viewPurchase(id) {
    const pu = await DB.get('purchases', id);
    const items = await DB.getAll('purchase_items', 'purchase_id', id);
    const settings = await App.getSettings();
    const currency = settings.currency || 'QAR';

    UI.modal(`
      <div class="modal-title">Purchase — ${pu.invoice_no || '#' + id}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;font-size:12px">
        <div><span class="text-muted">Supplier:</span> <strong>${pu.supplier_name || '—'}</strong></div>
        <div><span class="text-muted">Date:</span> ${pu.date}</div>
        <div><span class="text-muted">Invoice #:</span> ${pu.invoice_no || '—'}</div>
        <div><span class="text-muted">Notes:</span> ${pu.notes || '—'}</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Product</th><th>Qty</th><th>Unit Cost</th><th>Total</th></tr></thead>
          <tbody>
            ${items.map(it => `
              <tr>
                <td>${it.product_name || `Product #${it.product_id}`}</td>
                <td>${it.qty}</td>
                <td>${currency} ${fmt(it.unit_cost)}</td>
                <td class="fw-bold">${currency} ${fmt(it.line_total)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div style="text-align:right;margin-top:10px;font-size:14px;font-weight:600">
        Total: <span class="text-accent">${currency} ${fmt(pu.total)}</span>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="UI.closeModal()">Close</button>
      </div>
    `);
  },
};
